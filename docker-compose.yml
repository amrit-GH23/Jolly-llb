version: "3.9"

services:

  chromadb:
    image: chromadb/chroma
    container_name: chromadb
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: jolly_backend
    depends_on:
      - chromadb
    environment:
      - MY_OPENAI_API_KEY=${MY_OPENAI_API_KEY}
    volumes:
      - chroma_data:/app/chroma_data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: jolly_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  chroma_data:
